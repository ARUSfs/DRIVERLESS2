perception_acc:
  ros__parameters:
    #Topic
    lidar_topic: "/rslidar_points"

    #Accumulation
    accumulation: false
    distance_lidar_to_CoG: 1.5
    buffer_size: 3
    estimation_time: 0.0            # [s] Time to estimate the point cloud (during this time, the car should be at stand still)
    
    #Parameters of cropping
    crop: true
    max_x_fov: 25.0
    max_y_fov: 25.0
    max_z_fov: 0.5

    #Parameters of ground filter
    threshold_ground_filter: 0.05   # [m] Maximum distance of a point to the plane to be considered as part of the ground 
    eps_angle: 3.0                  # [degree] How much the ground can be tilted
    number_sections: 4              # Number of sections to divide the point cloud into
    angle_threshold: 3.0            # [degree] Maximum angle between the normal of the ground and the normal of the point cloud
    minimum_ransac_points: 30       # Minimum number of points to consider a plane

    #Parameters of reconstruction
    radius: 0.15                    # [m] Radius of the cone

    #Parameters of scoring
    threshold_scoring: 0.65         # Probability of being a cone

    #Parameters of coloring
    distance_threshold: 20.0
    intensity_threshold: 16.0

    debug: true